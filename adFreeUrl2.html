<!DOCTYPE html>
<html lang="bn">
<head>

<!-- =================================
CHARSET + MOBILE VIEW
================================= -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- =================================
PAGE TITLE
================================= -->
<title>SENDBOX PLAYER</title>

<style>

/* =================================
পুরো পেজ black background
================================= */

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}


/* =================================
PLAYER WRAPPER
================================= */

#video-wrapper{
width:100vw;
height:100vh;
position:relative;
background:#000;
}


/* =================================
IFRAME FULLSCREEN
================================= */

iframe{
width:100%;
height:100%;
border:none;
}


      
#countdown{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#666;
    font-size:80px;
    font-weight:bold;
    font-family:Arial,sans-serif;
    z-index:9999;

    pointer-events:none; /* কোনো ক্লিক ধরবে না */
    user-select:none;
}
  
  
  
</style>

</head>

<body>


<div id="video-wrapper">


<!-- =================================
IFRAME PLAYER
sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
এখানে PHP / EMBED PAGE লোড হবে
================================= -->

<iframe
id="phpFrame"
sandbox="allow-scripts allow-same-origin"
allow="autoplay; fullscreen; encrypted-media" 
allowfullscreen=""  
playsinline="" 
referrerpolicy="no-referrer" 
scrolling="no"
allowfullscreen
autoplay
></iframe>

<div id="countdown"></div>


</div>


<script>

/*

========================================

URL PARAMETER SYSTEM

Example link:

playerphp.html?url=https://streamcrichd.com/update/willowcricket.php

FULL Example:

https://asmaakther.github.io/playerphp/playerphp.html?url=https://streamcrichd.com/update/willowcricket.php

========================================

*/


/* URL PARAMETER READ */

const params=new URLSearchParams(window.location.search);


/* URL GET */

const url=params.get("url");


/* iframe select */

const frame=document.getElementById("phpFrame");


/* যদি URL থাকে iframe load করবে */

if(url){

frame.src=url;

}


/* যদি URL না থাকে error message */

else{

document.getElementById("centerText").innerHTML="NO STREAM LINK FOUND";

}

</script>

  
<script>
const countdown = document.getElementById("countdown");

// URL থেকে sec parameter পড়া
let count = parseInt(params.get("sec")) || 0;

if (count > 0) {

    countdown.style.display = "block";
    countdown.textContent = count;

    const timer = setInterval(() => {

        count--;

        if (count > 0) {

            countdown.textContent = count;

        } else {

            clearInterval(timer);
            countdown.style.display = "none";

        }

    }, 1000);

} else {

    // sec না থাকলে countdown দেখাবে না
    countdown.style.display = "none";

}
</script>
  
  
  
</body>
</html>
