<style>
/* Button Area Container */
.channel-menu {
    display: flex;
    align-items: center;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    gap: 4px;
    flex: 1;
    padding: 2px;
    scrollbar-height: thin;
    /* বাম থেকে ডানে দেখানোর জন্য */
    direction: ltr; 
    /* position: relative; */
  
    background: #222; /* #222; */
   height: 40px;
  
  }
  
.channel-menu::-webkit-scrollbar {
    height: 6px;
}

.channel-menu::-webkit-scrollbar-thumb {
    background: #552a86;
    border-radius: 20px;
}

/* Server Buttons Container */
#serverButtons {
    display: grid;
    /* ৪টি কলাম তৈরি করবে এবং ৪টির কম থাকলেও সমানভাবে জায়গা ভাগ করে নিবে */
    grid-template-columns: repeat(5, minmax(0, 1fr)); 
    gap: 4px;
    width: 100%;
    flex-shrink: 0; 
}

/* বাটন ৪টির বেশি হলে গ্রিডকে অটো কলামে কনভার্ট করবে যাতে স্ক্রলবার আসে */
#serverButtons:has(.server-btn:nth-child(5)) {
    display: flex;
    flex-wrap: nowrap;
}

/* Buttons */
.server-btn {
    flex-shrink: 0;
    flex-grow: 1;
    /* ৪টির বেশি বাটনের ক্ষেত্রে প্রতিটা ২৫% জায়গা নিবে */
    min-width: calc(20% - 4px); /* calc(25% - 4px); */
    padding: 6px 4px;
    border: none;
    border-radius: 12px; /*  0px;   */
    background: #552a86; /* #552a86; #d1020288; */
    color: #fff;
    white-space: nowrap;   /* 🔥 এইটা যোগ করো */
    border: 1px solid #777 ;  /*  */
    cursor: pointer;
    font-size: 14px;
    transition: .3s;
    text-align: center;
    text-overflow: ellipsis;
    overflow: hidden;
}

.server-btn:hover {
    background: #3d0380;
    transform: translateY(-1px);
}

.server-btn.active {
    background: rgb(0, 128, 0, 0.8);    /* rgb(0, 128, 0, 0.8);  #ff0000; */
    color: yellow;   /*  */
    font-weight: bold;   /*  */
    border: 1px solid yellow;     /*  */
  
}

/* Refresh Button Sticky on Right */
.refresh-btn {
    position: absolute;
    /* বাম থেকে ডানে আসার পর ডানপাশে স্টিকি রাখার জন্য */
    right: 0; 
    z-index: 10;
    flex-shrink: 0;
    width: 32px ;  /*  */
    height: 32px;  /*  */
    border: none;
    border-radius: 0;
    background: #333; /* #333; */
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0px; /* 2px;  */
    margin-left: auto; /* রিফ্রেশ বাটনকে ডানে পুশ করার জন্য */
}

.refresh-btn:hover {
    background: green;
}

.refresh-icon {
    width: 18px;
    height: 18px;
    fill: currentColor;
}
  
.refresh-btn.spin .refresh-icon {
    animation: spin .3s linear;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(100deg); }
}

/* Player Box - ভিডিও ফুল দেখানোর জন্য ফিক্সড */
.player-box {
  position:absolute;
  top:45px;  /* <-- control box top + control box height অনুযায়ী adjust */
  left:0;
  width:100%;
  height:calc(100% - 45px); /* পুরো page থেকে control box area বাদ দিলাম */
  border:none;
}

.player-box iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
}

/* unmute message */
#unmuteMsg {
    display: none;
    position: absolute;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: 2px solid #fff;
    padding: 10px 15px;
    border-radius: 8px;
    text-align: center;
    z-index: 99999;
    opacity: 0;
    transition: all 0.2s ease;
}

#unmuteMsg.show {
    bottom: 10px;
    opacity: 1;
}

#unmuteMsg.hide {
    bottom: -60px;
    opacity: 0;
}
      
#loding {
    position: absolute;
    pointer-events: none;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);  
    text-align: center;
    align-items: center;
    color: white; 
    background: rgba(0,0,0,0.0);
    padding: 0px ;
    margin: 0px;
    z-index: 10;
    display: none;
    animation: blink 1s infinite;
  
    font-size: 20px;  /* */
    font-weight: bold; /*  */
}
  

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
</style>

let currentServerIndex = 0;

const iframe = document.getElementById("player");
const serverContainer = document.getElementById("serverButtons");
const loader = document.getElementById("loding");
const msg = document.getElementById("unmuteMsg");

function renderServerButtons(){
    serverContainer.innerHTML = "";

    serverData.forEach((server, index)=>{
        let btn = document.createElement("div");
        btn.className = "server-btn";
        btn.innerHTML = server.name;
        btn.onclick = () => switchServer(index);
        serverContainer.appendChild(btn);
    });

    updateUI();
}

function switchServer(index){
    currentServerIndex = index;
    iframe.src = "about:blank";
    updateUI();
    const server = serverData[index];

    setTimeout(()=>{
        iframe.src = server.url + "?t=" + Date.now();
        showUnmuteMessage();
        if(server.countdown > 0){
            showLoading(server.countdown);
        } else {
            hideLoading();
        }
    }, 50);
}

function updateUI(){
    document.querySelectorAll(".server-btn").forEach((btn,i)=>{
        btn.classList.toggle("active", i === currentServerIndex);
    });
}

let loadTimer = null;

function showLoading(time){
    loader.style.display = "block";
    clearTimeout(loadTimer);
    loadTimer = setTimeout(()=>{
        loader.style.display = "none";
    }, time * 1000);
}

function hideLoading(){
    loader.style.display = "none";
}

function showUnmuteMessage(){
    msg.classList.add("show");
    setTimeout(()=>{
        msg.classList.remove("show");
    }, 3000);
}

  
  
  
function refreshVideo() {
    const btn = document.querySelector('.refresh-btn');
    const player = document.getElementById('player');

    // Spin animation শুরু
    btn.classList.add('spin');

    // Animation শেষ হলে ক্লাস সরিয়ে দিন
    setTimeout(() => {
        btn.classList.remove('spin');
    }, 300);

    // Video Refresh
    const currentSrc = player.src;
    player.src = "about:blank";

    setTimeout(() => {
        player.src = currentSrc + (currentSrc.includes("?") ? "&" : "?") + "t=" + Date.now();
    }, 50);
}

window.onload = function () {
    renderServerButtons();

    // URL থেকে server parameter পড়া
    const params = new URLSearchParams(window.location.search);
    let server = parseInt(params.get("server"));

    // যদি valid server হয়
    if (!isNaN(server) && server >= 1 && server <= serverData.length) {
        currentServerIndex = server - 1;
    } else {
        currentServerIndex = 0; // Default Server 1
    }

    switchServer(currentServerIndex);
};
